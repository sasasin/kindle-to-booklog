# .github/workflows/tagpr.yml
name: tagpr
on:
  push:
    branches: ["main"]
jobs:
  tagpr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: Songmu/tagpr@e84001bd5dac8defa0c75b3913937d284a3b3660 # v1 (major tag; latest release is v1.18.3)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
