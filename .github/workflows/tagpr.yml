# .github/workflows/tagpr.yml
name: tagpr
on:
  push:
    branches: ["main"]
jobs:
  tagpr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - uses: Songmu/tagpr@e84001bd5dac8defa0c75b3913937d284a3b3660 # v1 (major tag; latest release is v1.18.3)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
