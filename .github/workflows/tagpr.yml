# .github/workflows/tagpr.yml
name: tagpr
on:
  push:
    branches: ["main"]
jobs:
  tagpr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: Songmu/tagpr@e84001bd5dac8defa0c75b3913937d284a3b3660 # v1 (major tag; latest release is v1.18.3)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
